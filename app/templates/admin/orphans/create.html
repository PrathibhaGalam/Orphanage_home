{% extends "base.html" %}

{% block title %}Create Orphan Record - Admin Panel{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title mb-4">Create New Orphan Record</h3>
                
                <form method="POST" novalidate>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Name *</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="gender" class="form-label">Gender *</label>
                            <select class="form-select" id="gender" name="gender" required>
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="date_of_birth" class="form-label">Date of Birth *</label>
                            <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="orphanage_id" class="form-label">Orphanage *</label>
                            <select class="form-select" id="orphanage_id" name="orphanage_id" required>
                                <option value="">Select Orphanage</option>
                                {% for orphanage in orphanages %}
                                    <option value="{{ orphanage.id }}">{{ orphanage.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="health_status" class="form-label">Health Status</label>
                            <input type="text" class="form-control" id="health_status" name="health_status" placeholder="e.g., Good, Fair, Poor">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="education_level" class="form-label">Education Level</label>
                            <input type="text" class="form-control" id="education_level" name="education_level" placeholder="e.g., Grade 5">
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Create Record</button>
                        <a href="{{ url_for('admin.list_orphans') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
